[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stubber"
dynamic = ["version"]
description = "ModelSpec IR and deterministic .pyi stub generation (stubber)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "stubber contributors" }]
keywords = ["typing", "stubs", "pyi", "static-analysis", "ir"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = [
  "typer>=0.9.0",
  "typing_extensions>=4.2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "mypy>=1.0", "build>=1.0", "pytest-cov>=4.0"]

[project.scripts]
stubber = "stubber.cli:app"

[tool.hatch.version]
path = "stubber/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["stubber", "README.md", "LICENSE", "CHANGELOG.md", "docs", "modelspec_ir.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--cov=stubber", "--cov-report=term-missing", "--cov-fail-under=100"]

[tool.coverage.run]
branch = false
source = ["stubber"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
]

[tool.mypy]
python_version = "3.10"
strict = true
packages = ["stubber"]
