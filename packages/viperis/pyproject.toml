[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "viperis"
dynamic = ["version"]
description = "Python source to Velarium IR (frontend parser) — scaffold"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Velarium contributors" }]
dependencies = []

[tool.hatch.version]
path = "viperis/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["viperis"]
