[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "viperis"
dynamic = ["version"]
description = "Python source to Velarium IR (frontend parser) — scaffold"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Velarium contributors" }]
keywords = ["typing", "ir", "static-analysis", "velarium"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/velarium"
Repository = "https://github.com/eddiethedean/velarium"
Documentation = "https://github.com/eddiethedean/velarium/blob/main/docs/README.md"
Changelog = "https://github.com/eddiethedean/velarium/blob/main/CHANGELOG.md"

[tool.hatch.version]
path = "viperis/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["viperis", "README.md"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"

[tool.hatch.build.targets.wheel]
packages = ["viperis"]
