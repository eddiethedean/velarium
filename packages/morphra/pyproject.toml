[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "morphra"
dynamic = ["version"]
description = "Velarium IR to Pydantic models — scaffold"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Velarium contributors" }]
dependencies = []

[tool.hatch.version]
path = "morphra/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["morphra"]
