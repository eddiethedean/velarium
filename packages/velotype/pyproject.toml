[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "velotype"
dynamic = ["version"]
description = "Velarium IR to .pyi stub generation (velotype backend)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Velarium contributors" }]
keywords = ["typing", "stubs", "pyi", "static-analysis", "ir", "velarium"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = [
  "typer>=0.9.0",
  "velarium>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "ty>=0.0.29", "build>=1.0", "pytest-cov>=4.0"]

[project.scripts]
velotype = "velotype.cli:app"

[project.urls]
Homepage = "https://github.com/eddiethedean/velarium"
Repository = "https://github.com/eddiethedean/velarium"
Documentation = "https://github.com/eddiethedean/velarium/blob/main/docs/README.md"
Changelog = "https://github.com/eddiethedean/velarium/blob/main/CHANGELOG.md"

[tool.hatch.version]
path = "velotype/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["velotype", "README.md"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"
"../../CHANGELOG.md" = "CHANGELOG.md"
"../../docs" = "docs"
"../../modelspec_ir.md" = "modelspec_ir.md"

[tool.hatch.build.targets.wheel]
packages = ["velotype"]

[tool.uv.sources]
velarium = { workspace = true }
