[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "granitus"
dynamic = ["version"]
description = "Velarium IR to Spark-like schemas — scaffold"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Velarium contributors" }]
dependencies = []

[tool.hatch.version]
path = "granitus/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["granitus"]
