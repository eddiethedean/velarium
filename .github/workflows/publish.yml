# Publish to PyPI when:
# - a version tag is pushed (e.g. git push origin v0.6.0), or
# - a GitHub Release is published (for release notes without a new tag push).
# Full CI (ci-reusable.yml) must pass before build/publish.
# Auth: repository secret PYPI_API_TOKEN. See docs/RELEASING.md

name: Publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit
    with:
      checkout_ref: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  pypi:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # release events need an explicit tag; push(tag) already has refs/tags/… in github.ref
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-suffix: publish

      - name: Sync workspace (velarium + velotype)
        run: uv sync --locked --group dev

      - name: Install build
        run: uv pip install build

      - name: Build all packages into dist/
        run: |
          mkdir -p dist
          for pkg in velarium velotype viperis morphra granitus velocus; do
            (cd "packages/$pkg" && uv run python -m build --outdir "$GITHUB_WORKSPACE/dist")
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI: username __token__ + API token password (repo secret)
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: List artifacts
        run: ls -la dist/
