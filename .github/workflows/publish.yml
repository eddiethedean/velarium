# Publish to PyPI when a GitHub Release is published (requires PyPI trusted publishing setup).
# See docs/releasing.md

name: Publish

on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync workspace (velarium + stubber)
        run: uv sync --group dev

      - name: Install build
        run: uv pip install build

      - name: Build velarium and stubber into dist/
        run: |
          mkdir -p dist
          (cd packages/velarium && uv run python -m build --outdir "$GITHUB_WORKSPACE/dist")
          (cd packages/stubber && uv run python -m build --outdir "$GITHUB_WORKSPACE/dist")

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: List artifacts
        run: ls -la dist/
