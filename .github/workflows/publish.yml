# Publish to PyPI when a GitHub Release is published (requires PyPI trusted publishing setup).
# See docs/releasing.md

name: Publish

on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync workspace (velarium + velotype)
        run: uv sync --group dev

      - name: Install build
        run: uv pip install build

      - name: Build all packages into dist/
        run: |
          mkdir -p dist
          for pkg in velarium velotype viperis morphra granitus velocus; do
            (cd "packages/$pkg" && uv run python -m build --outdir "$GITHUB_WORKSPACE/dist")
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: List artifacts
        run: ls -la dist/
