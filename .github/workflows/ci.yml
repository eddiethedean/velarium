name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint (ruff + ty), tests, builds, stub-check — see ci-reusable.yml
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit
