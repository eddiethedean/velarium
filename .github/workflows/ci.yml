name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install workspace and dev tools
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: ty (type check)
        run: uv run python -m ty check

      - name: Build sdist and wheel (each package)
        run: |
          set -e
          for pkg in velarium velotype viperis morphra granitus velocus; do
            uv run python -m build "packages/$pkg"
          done

      - name: Verify artifacts
        run: find packages -type d -name dist -exec ls -la {} \;
