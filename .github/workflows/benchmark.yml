# Optional performance smoke: batch stub cold vs cached timing (non-blocking).
name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --group dev

      - name: Run batch benchmark script
        run: uv run python scripts/benchmark_velotype_batch.py
