# Optional performance smoke: batch stub cold vs cached timing (non-blocking).
name: Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install workspace
        run: uv sync --locked --group dev

      - name: Run batch benchmark script
        run: uv run python scripts/benchmark_velotype_batch.py
